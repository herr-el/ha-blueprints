blueprint:
  name: Shelly Switch Toggle
  description: >
    Schaltet Lichter oder Switches via Toggle bei jeder Zustandsänderung
    eines Shelly binary_sensor Inputs (z.B. Shelly i4, Shelly Plus 1, etc.).
    Kompatibel mit normalen Wippschaltern (kein Taster).
  domain: automation
  author: Julius
  input:
    switch_entity:
      name: Shelly Input Sensor
      description: Der binary_sensor des Shelly-Inputs (z.B. Input 0–3).
      selector:
        entity:
          filter:
            - domain: binary_sensor
    light_target:
      name: Ziel-Lichter (optional)
      description: Lichter die getoggelt werden sollen.
      default: {}
      selector:
        target:
          entity:
            - domain: light
    switch_target:
      name: Ziel-Switches (optional)
      description: Switches die getoggelt werden sollen.
      default: {}
      selector:
        target:
          entity:
            - domain: switch

mode: single

triggers:
  - trigger: state
    entity_id: !input switch_entity
    to: "on"
  - trigger: state
    entity_id: !input switch_entity
    to: "off"

actions:
  - action: light.toggle
    target: !input light_target
  - action: switch.toggle
    target: !input switch_target
